# Nginx security headers for the portfolio.
# Include inside the server { } block:  include /etc/nginx/snippets/portfolio-security.conf;
# `always` ensures headers are sent on error responses too.
#
# CSP is scoped to exactly what this site loads. The page boots via a
# client-side Design-Component runtime (support.js) that evaluates the logic
# class with `new Function` and loads React/ReactDOM (+ Babel for JSX imports)
# from unpkg with SRI -> script-src must keep 'unsafe-eval' and https://unpkg.com.
# Authored style="" attrs are applied via CSSOM (not CSP-governed); the runtime
# also injects <style> textContent blocks -> style-src needs 'unsafe-inline'.
# script-src 'unsafe-inline' is NOT required and is intentionally omitted.

add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self'; connect-src 'self' https://unpkg.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; object-src 'none'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header X-DNS-Prefetch-Control "off" always;

# Redirect all HTTP to HTTPS (enforce TLS-only):
#   server { listen 80; server_name _; return 301 https://$host$request_uri; }

# Do not expose the server version banner:
server_tokens off;
